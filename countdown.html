<script>
	class Storage {
		data;
		constructor(key, init) { }
		load() { }
		save() { }
	}
	class LocalStorage extends Storage {
		constructor(key, init) {
			super(key, init);
			if (typeof key !== 'string') {
				throw Error('Key should be string');
			}
			this.key = key;
			this.loaded = false;
			this.init = init;
		}
		load() {
			const self = this;
			if (self.loaded) {
				throw Error('Storage is already loaded');
			}
			try {
				const get = localStorage.getItem(self.key);
				if (!get) {
					throw '';
				}
				self.data = JSON.parse(get);
			} catch {
				self.data = self.init;
			}
			self.loaded = true;
			return self.data;
		}
		save() {
			const self = this;
			if (!self.loaded) {
				throw Error('Storage has not been loaded');
			}
			localStorage.setItem(self.key, JSON.stringify(self.data));
		}
	}
	const storage = new LocalStorage('countdown', {
		lightTheme: false,
		openHelp: false,
	});
	const storageData = storage.load();

	const hooks = [];
	function createTimer(endTimeDesc, numberBlocks) {
		const endTime = new Date(...endTimeDesc).getTime();
		hooks.push(function (nowTime) {
			const timeDelta = ((nowTime < endTime) ? (endTime - nowTime) : 0);
			const numbers = [
				Math.floor(timeDelta / 86400000),
				Math.floor((timeDelta % 86400000) / 3600000),
				Math.floor((timeDelta % 3600000) / 60000),
				Math.floor((timeDelta % 60000) / 1000),
			];
			const n = Math.min(numbers.length, numberBlocks.length);
			for (let i = 0; i < n; ++i) {
				numberBlocks[i].innerText = numbers[i];
			}
		});
	}
	function executeHooks() {
		const nowTime = Date.now();
		for (const hook of hooks) {
			hook(nowTime);
		}
	}

	let lightTheme = false;
	const themeElement = document.getElementById('theme');
	function updateTheme() {
		storageData.lightTheme = lightTheme;
		storage.save();
		if (lightTheme) {
			document.body.classList.add('light');
			themeElement.innerHTML = THEME_ICON_MOON;
		} else {
			document.body.classList.remove('light');
			themeElement.innerHTML = THEME_ICON_SUN;
		}
	}
	themeElement.addEventListener('click', function () {
		lightTheme = !lightTheme;
		updateTheme();
	});

	let showHelp = false;
	const helpDialogElement = document.getElementById('helpdialog');
	const openHelpElement = document.getElementById('openhelp');
	const closeHelpElement = document.getElementById('closehelp');
	function updateHelp() {
		storageData.showHelp = showHelp;
		storage.save();
		if (showHelp) {
			helpDialogElement.showModal();
		} else {
			helpDialogElement.close();
		}
	}
	openHelpElement.addEventListener('click', function () {
		showHelp = true;
		updateHelp();
	});
	closeHelpElement.addEventListener('click', function () {
		showHelp = false;
		updateHelp();
	});

	lightTheme = storageData.lightTheme;
	updateTheme();
	showHelp = storageData.showHelp;
	updateHelp();
</script>
